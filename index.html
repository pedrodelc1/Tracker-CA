<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Correo Argentino Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <h1 class="header-title">📦 Correo <span>Tracker</span></h1>
        <span class="last-updated" id="lastUpdated"></span>
      </div>
      <div class="header-right">
        <button class="btn btn-theme"    id="btnTheme"     title="Cambiar tema">🌙</button>
        <button class="btn btn-secondary" id="btnExport"   title="Exportar CSV">📥 CSV</button>
        <button class="btn btn-secondary" id="btnAddManual">+ Agregar</button>
        <button class="btn btn-primary"   id="btnRefresh"  >↻ Actualizar</button>
      </div>
    </header>

    <div class="container">
      <div class="notice" id="noticeLogin" style="display:none">
        <span>⚠️</span>
        <span>Tu sesión expiró o no estás logueado.</span>
        <button class="btn btn-login" id="btnLogin">Iniciar sesión →</button>
      </div>

      <div class="notice notice-info" id="noticeInfo" style="display:none">
        <span id="noticeInfoText"></span>
        <button class="notice-close" id="btnCloseInfo">✕</button>
      </div>

      <div id="loadingState" class="loading-state" style="display:none">
        <div class="spinner"></div>
        <p>Obteniendo pedidos...</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="pendientes">Pendientes <span class="tab-count" id="countPendientes"></span></button>
        <button class="tab-btn"        data-tab="pagados">Pagados <span class="tab-count" id="countPagados"></span></button>
        <button class="tab-btn"        data-tab="manuales">Manuales <span class="tab-count" id="countManuales"></span></button>
      </div>

      <div class="toolbar">
        <input class="search-input" id="searchInput" type="search" placeholder="🔍 Buscar por nombre, destinatario..." />
        <select class="sort-select" id="sortSelect">
          <option value="status">Ordenar: Estado</option>
          <option value="name">Ordenar: Nombre</option>
          <option value="date">Ordenar: Fecha</option>
        </select>
      </div>

      <div id="emptyState" class="empty-state" style="display:none">
        <p class="empty-icon">📭</p>
        <p>No hay pedidos en esta pestaña.</p>
      </div>

      <div class="grid" id="cardsGrid"></div>
    </div>
  </div>

  <!-- Modal: Agregar tracking manual -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <h2 class="modal-title">Agregar pedido</h2>
      <label class="modal-label">Número de tracking <span class="req">*</span></label>
      <input class="modal-input" id="inputTracking" type="text" placeholder="Ej: 00015836838A73023G1E701" />
      <label class="modal-label">Nombre / Etiqueta</label>
      <input class="modal-input" id="inputLabel" type="text" placeholder="Ej: Zapatillas Nike" />
      <label class="modal-label">Nota (opcional)</label>
      <textarea class="modal-input modal-textarea" id="inputNote" placeholder="Ej: Llegó tarde la última vez..."></textarea>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btnModalCancel">Cancelar</button>
        <button class="btn btn-primary"   id="btnModalAdd">Agregar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
